name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on any tag like v1.0.0, v1.1.0, etc.

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Building version $VERSION"
          npm version $VERSION --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers

      - name: Verify Chromium bundled correctly
        run: |
          echo "=== pw-browsers contents ==="
          ls pw-browsers/ 2>/dev/null || echo "NOT FOUND"
          echo "=== Chromium binary ==="
          find pw-browsers -name "chrome-headless-shell" 2>/dev/null | head -5 || echo "binary not found"

      - name: Build & publish DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Upload DMG as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: tracking-validator-dmg
          path: dist/*.dmg
          retention-days: 30